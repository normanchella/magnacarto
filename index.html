<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagnaCarto — The Realms of Knowledge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#f0e2c4; --parchment-dark:#e6d4ae; --ink:#4a3826; --ink-faint:#7a6549;
    --panel:#2e2418; --panel-text:#e8d9bd;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#1d1710;font-family:'IM Fell English',serif;}
  #map{display:block;width:100%;height:100%;cursor:grab;touch-action:none;}
  #map.dragging{cursor:grabbing;}

  /* ---------- Settings panel ---------- */
  #panel{
    position:fixed;top:12px;right:12px;width:248px;background:rgba(46,36,24,.93);
    border:1px solid #6b5638;border-radius:6px;color:var(--panel-text);
    padding:14px 16px;z-index:10;backdrop-filter:blur(4px);
    box-shadow:0 4px 18px rgba(0,0,0,.5);
  }
  #panel h2{font-family:'IM Fell English SC',serif;font-size:17px;letter-spacing:1px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
  #panel h2 button{background:none;border:none;color:var(--panel-text);font-size:15px;cursor:pointer;font-family:inherit;}
  #panel.collapsed .body{display:none;}
  #panel label{display:block;font-size:13px;margin-top:10px;letter-spacing:.5px;}
  #panel select{width:100%;background:#1d1710;border:1px solid #6b5638;color:var(--panel-text);padding:4px 6px;border-radius:3px;font-family:inherit;font-size:13px;margin-top:2px;}
  #panel input[type=range]{width:100%;accent-color:#c9a86a;margin-top:2px;}
  #panel .toggles{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;font-size:13px;}
  #panel .toggles label{margin:0;display:flex;align-items:center;gap:5px;cursor:pointer;}
  #panel input[type=checkbox]{accent-color:#c9a86a;}
  #panel .seedrow{margin-top:12px;display:flex;gap:6px;}
  #panel .seedrow input{flex:1;min-width:0;background:#1d1710;border:1px solid #6b5638;color:var(--panel-text);padding:4px 6px;border-radius:3px;font-family:inherit;font-size:13px;}
  #panel .seedrow button{background:#6b5638;border:none;color:#f0e2c4;padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:13px;}
  #panel .seedrow button:hover{background:#84693f;}
  #panel .hint{font-size:11px;color:#a08a66;margin-top:10px;line-height:1.4;}

  /* ---------- Zoom controls ---------- */
  #zoomctl{position:fixed;left:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:10;}
  #zoomctl button{
    width:36px;height:36px;border-radius:4px;border:1px solid #6b5638;background:rgba(46,36,24,.93);
    color:var(--panel-text);font-size:20px;cursor:pointer;font-family:'IM Fell English',serif;
  }
  #zoomctl button:hover{background:#4a3a26;}
  #zoomlabel{
    position:fixed;left:12px;bottom:12px;background:rgba(46,36,24,.93);border:1px solid #6b5638;
    color:var(--panel-text);padding:5px 12px;border-radius:4px;font-size:13px;z-index:10;
    font-family:'IM Fell English SC',serif;letter-spacing:1px;
  }
  #tooltip{
    position:fixed;pointer-events:none;display:none;z-index:20;max-width:240px;
    background:rgba(46,36,24,.95);border:1px solid #6b5638;color:var(--panel-text);
    padding:8px 10px;border-radius:4px;font-size:13px;line-height:1.45;
  }
  #tooltip .t{font-family:'IM Fell English SC',serif;font-size:14px;color:#e9c98a;}
  #tooltip .m{font-size:11.5px;color:#a08a66;}
</style>

<body>
<canvas id="map"></canvas>

<div id="panel">
  <h2>Cartographer's Table <button id="collapse">−</button></h2>
  <div class="body">
    <label>Theme
      <select id="themeSel">
        <option value="sepia">Sepia Atlas</option>
        <option value="midnight">Midnight Ink</option>
        <option value="ashfall">Ashfall</option>
        <option value="frostbound">Frostbound</option>
      </select>
    </label>
    <label>Label density <input type="range" id="sLabels" min="0" max="100" value="55"></label>
    <label>Decoration <input type="range" id="sDeco" min="0" max="100" value="60"></label>

    <div class="toggles">
      <label><input type="checkbox" id="tRoads" checked> Roads</label>
      <label><input type="checkbox" id="tBorders" checked> Borders</label>
      <label><input type="checkbox" id="tSea" checked> Sea life</label>

</div>

<div id="zoomctl">
  <button id="zin">+</button>

  <button id="zfit" title="Fit map" style="font-size:13px">⌂</button>
</div>
<div id="zoomlabel">Grand Map</div>
<div id="tooltip"></div>

<script>
'use strict';
/* ================================================================
   MagnaCarto — Phase 1 prototype
   PKM data → sepia fantasy map. Procedural, seeded, canvas-rendered.
   ================================================================ */

/* ---------------- Seeded RNG + noise ---------------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function strSeed(s){let h=1779033703;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return h>>>0;}
function makeNoise(rand){
  const tab=new Float32Array(512); for(let i=0;i<512;i++) tab[i]=rand();
  const hash=(x,y)=>tab[(((x*374761393+y*668265263)^(x<<7))&511+512)&511];
  function n2(x,y){
    const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
    const sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);
    const a=hash(ix,iy),b=hash(ix+1,iy),c=hash(ix,iy+1),d=hash(ix+1,iy+1);
    return a+(b-a)*sx+(c-a)*sy+(a-b-c+d)*sx*sy;
  }
  return function fbm(x,y,oct=4){let v=0,amp=.5,f=1;for(let o=0;o<oct;o++){v+=amp*n2(x*f,y*f);amp*=.5;f*=2.1;}return v;};
}

/* ---------------- Sample PKM dataset ---------------- */
const KINGDOM_DEFS=[
  {name:'Philosophia',theme:'mountains',sub:'Realm of First Principles',
   provinces:['Stoa Heights','The Epistemic Range','Ethica Vale'],
   titles:['On negative visualization','Memento mori as planning tool','The map–territory problem','Wittgenstein and word-games','Notes on virtue ethics','Free will — compatibilist reading','Epistemic humility checklist','Stoic morning routine','Hume on causation','What counts as knowledge?','The examined life, revisited','Absurdism vs. nihilism','Reading log — Meditations','Second-order thinking','On intellectual honesty']},
  {name:'Vox',theme:'hills',sub:'The Podcasting Marches',
   provinces:['Interview Downs','Audio Hollow','The Listener Coast'],
   titles:['Episode 42 — interview prep','Guest outreach template','Why people stop listening at 8 min','Mic chain settings that work','Show notes workflow','Question banks by guest type','Cold open experiments','Editing pass checklist','Podcast similarity scoring idea','Audience survey results','Distribution channel notes','Remote recording setup','Voice warmup routine','Episode retro — what landed']},
  {name:'Fabula',theme:'forest',sub:'The Storytelling Wilds',
   provinces:['Plotwood','Character Glen','The Worldbuilding Deep'],
   titles:['Eterna — premise sketch','Magic system constraints','Character wound, want, need','Dialogue beats cheat sheet','Three-act vs. kishotenketsu','Naming languages quickly','Scene entry hooks','The unreliable narrator toolkit','Worldbuilding — economy first','Sensory detail pass','Antagonist motivation matrix','Short story — the lighthouse draft','Myth structure notes','Eterna — faction map']},
  {name:'Praxis',theme:'plains',sub:'Kingdom of Projects',
   provinces:['Shipping Fields','The Backlog Steppe'],
   titles:['MagnaCarto app brief','Artisan apps — viability list','Weekly review template','Project kickoff questions','Definition of done','Energy-based scheduling','Quarterly goals — draft','Automation candidates','CloeverAI voice concept','Anki Yugioh mnemonic app','Jar tracker chatbot spec','Museum text archive idea','Build vs. buy notes']},
  {name:'Aurum',theme:'hills',sub:'The Treasury Hills',
   provinces:['Ledger Rise','Coinford'],
   titles:['Jar budgeting method','Subscription audit','Emergency fund target','Index fund notes','Freelance rate calculation','Tax season checklist','Spending review — May','Money scripts I inherited','Sinking funds setup','Net worth tracker design']},
  {name:'Machina',theme:'swamp',sub:'The Toolmaker Fens',
   provinces:['Tana Mire','Scriptmarsh'],
   titles:['Tana supertag patterns','Daily note template v3','Export pipeline sketch','API vs. browser scraping','Obsidian sync conflicts','Keyboard-first capture','Search operators cheat sheet','Plugin wishlist','Backup strategy','Graph view — useful or toy?','Command palette habits','Schema migration notes']},
];

function generateData(rand){
  const kingdoms=[]; let id=0; const allNotes=[];
  for(const kd of KINGDOM_DEFS){
    const k={name:kd.name,sub:kd.sub,theme:kd.theme,provinces:[]};
    const pool=[...kd.titles];
    kd.provinces.forEach((pn,pi)=>{
      const p={name:pn,notes:[]};
      const n=5+Math.floor(rand()*5);
      for(let i=0;i<n&&pool.length;i++){
        const t=pool.splice(Math.floor(rand()*pool.length),1)[0];
        const days=Math.floor(rand()*rand()*720);
        const note={id:id++,title:t,days,links:[],kingdom:k,province:p};
        p.notes.push(note); allNotes.push(note);
      }
      k.provinces.push(p);
    });
    kingdoms.push(k);
  }
  // links: weighted toward same province
  for(const n of allNotes){
    const cnt=1+Math.floor(rand()*rand()*5);
    for(let i=0;i<cnt;i++){
      const local=rand()<0.65&&n.province.notes.length>1;
      const poolL=local?n.province.notes:allNotes;
      const m=poolL[Math.floor(rand()*poolL.length)];
      if(m!==n&&!n.links.includes(m.id)) n.links.push(m.id);
    }
  }
  finishData(allNotes,rand);
  return {kingdoms,allNotes};
}

function finishData(allNotes,rand){
  const inbound={}; allNotes.forEach(n=>n.links.forEach(l=>inbound[l]=(inbound[l]||0)+1));
  let maxDeg=1; allNotes.forEach(n=>{n.degree=n.links.length+(inbound[n.id]||0); maxDeg=Math.max(maxDeg,n.degree);});
  allNotes.forEach(n=>{
    const rec=Math.exp(-n.days/200);
    n.prominence=Math.min(1,.55*(n.degree/maxDeg)+.35*rec+.1*rand());
  });
}

/* Build data from a user-supplied dataset (see eterna-data.template.json for the schema) */
function buildCustomData(rand,ds){
  const kingdoms=[]; let id=0; const allNotes=[]; const byTitle={};
  for(const kd of ds.kingdoms){
    const k={name:kd.name||'Unnamed',sub:kd.sub||'',theme:kd.theme||'plains',pos:kd.position,provinces:[]};
    for(const pd of kd.provinces||[]){
      const p={name:pd.name||'Unnamed',notes:[]};
      for(const nd of pd.notes||[]){
        const title=typeof nd==='string'?nd:nd.title;
        const days=typeof nd==='object'&&nd.days!=null?nd.days:Math.floor(rand()*rand()*720);
        const note={id:id++,title,days,links:(typeof nd==='object'&&nd.links)||[],kingdom:k,province:p};
        p.notes.push(note); allNotes.push(note); byTitle[title]=note;
      }
      k.provinces.push(p);
    }
    kingdoms.push(k);
  }
  // links may be note titles or numeric ids — resolve to ids
  for(const n of allNotes){
    n.links=n.links.map(l=>typeof l==='number'?l:(byTitle[l]?byTitle[l].id:-1)).filter(i=>i>=0&&i!==n.id);
  }
  finishData(allNotes,rand);
  return {kingdoms,allNotes,title:ds.title,subtitle:ds.subtitle,seaName:ds.seaName};
}

/* ---------------- World generation ---------------- */
const W=2600,H=1700;            // world coords
const GW=170,GH=112;            // field grid
let world=null;
let currentDataset=null;   // user-loaded dataset (null = built-in sample)

function generateWorld(seedStr){
  const seed=strSeed(seedStr);
  const rand=mulberry32(seed);
  const fbm=makeNoise(mulberry32(seed^0x9e3779b9));
  const data=currentDataset
    ? buildCustomData(mulberry32(seed^0x85ebca6b),currentDataset)
    : generateData(mulberry32(seed^0x85ebca6b));
  const K=data.kingdoms.length;

  // kingdom centers — golden-angle ring with jitter; optional "position" hints override
  const cx=W/2,cy=H/2;
  const ANCHORS={north:-Math.PI/2,south:Math.PI/2,east:0,west:Math.PI,
    northeast:-Math.PI/4,northwest:-3*Math.PI/4,southeast:Math.PI/4,southwest:3*Math.PI/4};
  data.kingdoms.forEach((k,i)=>{
    k.r=300+rand()*130;
    if(k.pos==='center'){
      k.cx=cx+(rand()-0.5)*100; k.cy=cy+(rand()-0.5)*80; return;
    }
    const a=(k.pos in ANCHORS)?ANCHORS[k.pos]+(rand()-0.5)*0.25:i*2.39996+rand()*0.6;
    const rr=(0.16+0.16*rand())*Math.min(W,H);
    k.cx=cx+Math.cos(a)*rr*1.45; k.cy=cy+Math.sin(a)*rr;
  });

  // scalar field
  const field=new Float32Array(GW*GH);
  const fx=W/(GW-1), fy=H/(GH-1);
  const sampleRaw=(x,y)=>{
    let v=0;
    for(const k of data.kingdoms){
      const dx=(x-k.cx)/k.r, dy=(y-k.cy)/k.r;
      v+=Math.exp(-(dx*dx+dy*dy)*1.6);
    }
    const dxc=(x-W/2)/(W*0.30), dyc=(y-H/2)/(H*0.34);
    v+=0.5*Math.exp(-(dxc*dxc+dyc*dyc));          // central mass — keeps the continent contiguous
    v+= (fbm(x*0.0035,y*0.0035)-0.5)*0.55;
    const ex=Math.min(1,Math.min(x,W-x)/(W*0.13));
    const ey=Math.min(1,Math.min(y,H-y)/(H*0.16));
    return v*Math.pow(Math.max(0,ex*ey),0.6);
  };
  for(let j=0;j<GH;j++)for(let i=0;i<GW;i++) field[j*GW+i]=sampleRaw(i*fx,j*fy);
  const T=0.42;
  const fieldAt=(x,y)=>{
    const gx=Math.max(0,Math.min(GW-1.001,x/fx)), gy=Math.max(0,Math.min(GH-1.001,y/fy));
    const ix=Math.floor(gx),iy=Math.floor(gy),u=gx-ix,v2=gy-iy;
    const a=field[iy*GW+ix],b=field[iy*GW+ix+1],c=field[(iy+1)*GW+ix],d=field[(iy+1)*GW+ix+1];
    return a+(b-a)*u+(c-a)*v2+(a-b-c+d)*u*v2;
  };
  const onLand=(x,y,m=0.02)=>fieldAt(x,y)>T+m;

  // ----- marching squares → coast loops -----
  const segs=[];
  const interp=(x1,y1,v1,x2,y2,v2)=>{const t=(T-v1)/(v2-v1);return [x1+(x2-x1)*t,y1+(y2-y1)*t];};
  for(let j=0;j<GH-1;j++)for(let i=0;i<GW-1;i++){
    const x0=i*fx,y0=j*fy,x1=(i+1)*fx,y1=(j+1)*fy;
    const tl=field[j*GW+i],tr=field[j*GW+i+1],br=field[(j+1)*GW+i+1],bl=field[(j+1)*GW+i];
    let idx=(tl>=T?8:0)|(tr>=T?4:0)|(br>=T?2:0)|(bl>=T?1:0);
    if(idx===0||idx===15)continue;
    const E={ top:()=>interp(x0,y0,tl,x1,y0,tr), right:()=>interp(x1,y0,tr,x1,y1,br),
              bottom:()=>interp(x1,y1,br,x0,y1,bl), left:()=>interp(x0,y1,bl,x0,y0,tl) };
    const add=(e1,e2)=>segs.push([E[e1](),E[e2]()]);
    switch(idx){
      case 1: add('left','bottom');break;   case 2: add('bottom','right');break;
      case 3: add('left','right');break;    case 4: add('top','right');break;
      case 5: add('top','right');add('left','bottom');break;
      case 6: add('top','bottom');break;    case 7: add('top','left');break;
      case 8: add('top','left');break;      case 9: add('top','bottom');break;
      case 10: add('top','right');add('left','bottom');break;
      case 11: add('top','right');break;    case 12: add('left','right');break;
      case 13: add('right','bottom');break; case 14: add('left','bottom');break;
    }
  }
  // join segments into loops
  const key=p=>Math.round(p[0]*4)+'_'+Math.round(p[1]*4);
  const adj=new Map();
  segs.forEach((s,si)=>{
    for(const [a,b] of [[s[0],s[1]],[s[1],s[0]]]){
      const k=key(a); if(!adj.has(k))adj.set(k,[]); adj.get(k).push({pt:b,si});
    }
  });
  const used=new Set(); const loops=[];
  for(let si=0;si<segs.length;si++){
    if(used.has(si))continue;
    const loop=[segs[si][0],segs[si][1]]; used.add(si);
    let guard=0;
    while(guard++<segs.length*2){
      const cur=loop[loop.length-1];
      const opts=(adj.get(key(cur))||[]).filter(o=>!used.has(o.si));
      if(!opts.length)break;
      used.add(opts[0].si); loop.push(opts[0].pt);
      if(key(opts[0].pt)===key(loop[0])) break;
    }
    if(loop.length>8) loops.push(loop);
  }
  // smooth (Chaikin x2, closed)
  const chaikin=pts=>{const o=[];const n=pts.length;for(let i=0;i<n;i++){const a=pts[i],b=pts[(i+1)%n];o.push([a[0]*.75+b[0]*.25,a[1]*.75+b[1]*.25],[a[0]*.25+b[0]*.75,a[1]*.25+b[1]*.75]);}return o;};
  const coast=loops.map(l=>chaikin(chaikin(l)));
  const coastPath=new Path2D();
  for(const l of coast){coastPath.moveTo(l[0][0],l[0][1]);for(let i=1;i<l.length;i++)coastPath.lineTo(l[i][0],l[i][1]);coastPath.closePath();}

  // ----- placement helpers -----
  const placeOnLand=(px,py,spread,tries=40)=>{
    for(let t=0;t<tries;t++){
      const x=px+(rand()*2-1)*spread,y=py+(rand()*2-1)*spread;
      if(onLand(x,y,0.05))return [x,y];
    }
    return null;
  };
  // provinces & notes
  for(const k of data.kingdoms){
    const np=k.provinces.length;
    k.provinces.forEach((p,pi)=>{
      const a=(pi/np)*Math.PI*2+rand(), rr=k.r*(0.28+rand()*0.3);
      const pos=placeOnLand(k.cx+Math.cos(a)*rr,k.cy+Math.sin(a)*rr,k.r*0.3)||[k.cx,k.cy];
      p.cx=pos[0];p.cy=pos[1];
      for(const n of p.notes){
        const np2=placeOnLand(p.cx,p.cy,90+120*(1-n.prominence))||[p.cx,p.cy];
        n.x=np2[0];n.y=np2[1];
      }
    });
  }
  // keep settlements apart (a few relaxation passes)
  for(let pass=0;pass<3;pass++){
    for(const n of data.allNotes)for(const m of data.allNotes){
      if(n===m)continue;
      const dx=m.x-n.x,dy=m.y-n.y,d=Math.hypot(dx,dy);
      if(d<42&&d>0){const push=(42-d)/2/d; n.x-=dx*push;n.y-=dy*push;m.x+=dx*push;m.y+=dy*push;}
    }
  }

  // ----- terrain icons -----
  const mountains=[],forests=[],hills=[],swamps=[];
  for(const k of data.kingdoms){
    const target= k.theme==='mountains'?mountains : k.theme==='forest'?forests : k.theme==='swamp'?swamps : k.theme==='hills'?hills : null;
    if(!target)continue;
    const count=k.theme==='mountains'?46:k.theme==='forest'?56:34;
    for(let i=0;i<count;i++){
      const pos=placeOnLand(k.cx,k.cy,k.r*0.75);
      if(!pos)continue;
      // avoid settlements
      let ok=true;
      for(const p of k.provinces)for(const n of p.notes){if(Math.hypot(n.x-pos[0],n.y-pos[1])<34){ok=false;break;}}
      if(ok)target.push({x:pos[0],y:pos[1],s:1.6+rand()*1.5,o:rand()});
    }
  }
  mountains.sort((a,b)=>a.y-b.y); forests.sort((a,b)=>a.y-b.y);

  // ----- rivers: walk downhill from a high point to the sea -----
  const rivers=[];
  for(let r=0;r<5;r++){
    const k=data.kingdoms[Math.floor(rand()*K)];
    let x=k.cx+(rand()*2-1)*k.r*.4, y=k.cy+(rand()*2-1)*k.r*.4;
    if(!onLand(x,y,0.1))continue;
    const path=[[x,y]];
    for(let s=0;s<260;s++){
      const e=8;
      const gx=fieldAt(x+e,y)-fieldAt(x-e,y), gy=fieldAt(x,y+e)-fieldAt(x,y-e);
      const gl=Math.hypot(gx,gy)||1;
      x-=gx/gl*9+(rand()-0.5)*7; y-=gy/gl*9+(rand()-0.5)*7;
      path.push([x,y]);
      if(fieldAt(x,y)<T)break;
    }
    if(path.length>26&&fieldAt(x,y)<T) rivers.push(path);
  }

  // ----- kingdom borders (dots along nearest-kingdom change) -----
  const nearestK=(x,y)=>{let bi=0,bd=1e9;data.kingdoms.forEach((k,i)=>{const d=Math.hypot(x-k.cx,y-k.cy)/k.r;if(d<bd){bd=d;bi=i;}});return bi;};
  const borderDots=[];
  const step=14;
  for(let y=step;y<H;y+=step)for(let x=step;x<W;x+=step){
    if(!onLand(x,y,0.04))continue;
    const a=nearestK(x,y);
    if((onLand(x+step,y,0.04)&&nearestK(x+step,y)!==a)||(onLand(x,y+step,0.04)&&nearestK(x,y+step)!==a))
      borderDots.push([x+(rand()-.5)*4,y+(rand()-.5)*4]);
  }

  // ----- sea decorations -----
  const seaSpots=[];const waveMarks=[];
  for(let i=0;i<140;i++){
    const x=rand()*W,y=rand()*H;
    if(fieldAt(x,y)<T-0.12) waveMarks.push([x,y,rand()]);
  }
  for(let i=0;i<3;i++){
    for(let t=0;t<30;t++){
      const x=rand()*W,y=rand()*H;
      if(fieldAt(x,y)<T-0.2&&x>140&&x<W-140&&y>140&&y<H-140){seaSpots.push({x,y,kind:i===0?'serpent':i===1?'ship':'compassfish',r:rand()});break;}
    }
  }
  // grass tufts — fill empty interiors at regional zoom
  const tufts=[];
  for(let i=0;i<700;i++){
    const x=rand()*W,y=rand()*H;
    if(onLand(x,y,0.06))tufts.push([x,y,0.7+rand()*0.7]);
  }
  // landmass blotches for texture
  const blotches=[];
  for(let i=0;i<26;i++){const x=rand()*W,y=rand()*H;if(onLand(x,y,0.05))blotches.push({x,y,r:60+rand()*150,a:0.025+rand()*0.03});}

  return {seedStr,data,coast,coastPath,mountains,forests,hills,swamps,rivers,borderDots,seaSpots,waveMarks,blotches,tufts,fieldAt,T};
}

/* ---------------- View state ---------------- */
const canvas=document.getElementById('map');
const ctx=canvas.getContext('2d');
let view={x:0,y:0,scale:0.5};   // world→screen: s = (w - [x,y]) * scale
let dpr=1;

function resize(){
  dpr=window.devicePixelRatio||1;
  canvas.width=innerWidth*dpr; canvas.height=innerHeight*dpr;
  canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
  draw();
}
function fit(){
  const s=Math.min(innerWidth/W,innerHeight/H)*0.98;
  view.scale=s;
  view.x=(W-innerWidth/s)/2; view.y=(H-innerHeight/s)/2;
  draw();
}
const w2sX=x=>(x-view.x)*view.scale, w2sY=y=>(y-view.y)*view.scale;
const s2wX=x=>x/view.scale+view.x, s2wY=y=>y/view.scale+view.y;

/* ---------------- Dataset loading ---------------- */
function loadDataset(ds,sourceName){
  if(!ds||!Array.isArray(ds.kingdoms)||!ds.kingdoms.length){
    alert('Could not load: the JSON needs a non-empty "kingdoms" array.\nSee eterna-data.template.json for the format.');return;
  }
  currentDataset=ds;
  if(ds.theme&&THEMES[ds.theme])applyTheme(ds.theme);
  const seed=document.getElementById('seedIn').value.trim()||'eterna';
  world=generateWorld(seed);
  document.getElementById('dataHint').textContent=(ds.title||sourceName||'Custom data')+' · '+world.data.allNotes.length+' notes loaded.';
  fit();
}
async function loadFile(f){
  try{ loadDataset(JSON.parse(await f.text()),f.name); }
  catch(err){ alert('Could not read JSON: '+err.message); }
}

});

window.addEventListener('drop',e=>{

  if(f)loadFile(f);
});

/* ---------------- Drawing helpers ---------------- */
function smooth01(a,b,x){const t=Math.max(0,Math.min(1,(x-a)/(b-a)));return t*t*(3-2*t);}

function drawMountain(c,x,y,s){
  c.beginPath();
  c.moveTo(x-11*s,y); c.lineTo(x-4*s,y-13*s); c.lineTo(x-1*s,y-8*s);
  c.lineTo(x+3*s,y-15*s); c.lineTo(x+11*s,y);
  c.stroke();
  c.beginPath(); c.moveTo(x+3*s,y-15*s); c.lineTo(x+4.5*s,y-6*s); c.stroke(); // shading ridge
}
function drawTree(c,x,y,s){
  c.beginPath(); c.arc(x,y-6*s,4.5*s,Math.PI*0.9,Math.PI*2.1);
  c.arc(x-3.4*s,y-3.5*s,3.4*s,Math.PI*0.7,Math.PI*1.8);
  c.arc(x+3.4*s,y-3.5*s,3.4*s,Math.PI*1.25,Math.PI*2.4);
  c.stroke();
  c.beginPath(); c.moveTo(x,y-1.5*s); c.lineTo(x,y+2.5*s); c.stroke();
}
function drawHill(c,x,y,s){ c.beginPath(); c.arc(x,y,8*s,Math.PI,Math.PI*2); c.stroke(); }
function drawSwamp(c,x,y,s){
  c.beginPath();
  c.moveTo(x-7*s,y);c.lineTo(x+7*s,y);
  c.moveTo(x-4*s,y+3*s);c.lineTo(x+4*s,y+3*s);
  c.moveTo(x-2*s,y-3*s);c.lineTo(x+2*s,y-3*s);
  c.stroke();
}
function drawCity(c,x,y,s){ // tower cluster
  c.beginPath();
  c.rect(x-6*s,y-7*s,4*s,7*s); c.rect(x-1*s,y-11*s,4*s,11*s); c.rect(x+4*s,y-6*s,3.5*s,6*s);
  c.moveTo(x-6*s,y-7*s); c.lineTo(x-4*s,y-9.5*s); c.lineTo(x-2*s,y-7*s);
  c.moveTo(x-1*s,y-11*s); c.lineTo(x+1*s,y-13.5*s); c.lineTo(x+3*s,y-11*s);
  c.stroke();
  c.beginPath();c.moveTo(x-8*s,y);c.lineTo(x+9*s,y);c.stroke();
}
function drawTown(c,x,y,s){
  c.beginPath();
  c.rect(x-4*s,y-4.5*s,8*s,4.5*s);
  c.moveTo(x-5*s,y-4.5*s); c.lineTo(x,y-9*s); c.lineTo(x+5*s,y-4.5*s);
  c.stroke();
}
function drawHamlet(c,x,y,s){ c.beginPath(); c.arc(x,y,2.4*s,0,Math.PI*2); c.fill(); }
function drawSerpent(c,x,y,s){
  c.save();c.translate(x,y);c.scale(s,s);
  c.beginPath();
  c.moveTo(-34,0);
  c.bezierCurveTo(-26,-16,-18,-16,-10,0);
  c.moveTo(2,0); c.bezierCurveTo(10,-14,18,-14,26,0);
  c.stroke();
  c.beginPath(); c.arc(32,-4,5,Math.PI*0.8,Math.PI*2.5); c.stroke(); // head
  c.beginPath(); c.moveTo(-34,0); c.lineTo(-40,-9); c.lineTo(-37,1); c.stroke(); // tail
  c.restore();
}
function drawShip(c,x,y,s){
  c.save();c.translate(x,y);c.scale(s,s);
  c.beginPath(); c.moveTo(-14,0); c.quadraticCurveTo(0,8,14,0); c.lineTo(10,-2); c.lineTo(-12,-2); c.closePath(); c.stroke();
  c.beginPath(); c.moveTo(0,-2); c.lineTo(0,-16); c.stroke();
  c.beginPath(); c.moveTo(0,-16); c.quadraticCurveTo(9,-11,1,-5); c.closePath(); c.stroke();
  c.restore();
}
function drawCompassRose(c,x,y,r){
  c.save();c.translate(x,y);
  c.strokeStyle=INK;c.fillStyle=INK;c.lineWidth=1;
  c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(0,0,r*0.62,0,Math.PI*2);c.stroke();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4, len=i%2===0?r*0.95:r*0.5;
    c.beginPath();
    c.moveTo(Math.cos(a-0.12)*r*0.16,Math.sin(a-0.12)*r*0.16);
    c.lineTo(Math.cos(a)*len,Math.sin(a)*len);
    c.lineTo(Math.cos(a+0.12)*r*0.16,Math.sin(a+0.12)*r*0.16);
    c.closePath();
    if(i%2===0)c.fill();else c.stroke();
  }
  c.font=`${Math.round(r*0.42)}px 'IM Fell English SC'`;c.textAlign='center';
  c.fillText('N',0,-r-5);
  c.restore();
}

/* ---------------- Parchment overlay (precomputed) ---------------- */
let grain=null;
function makeGrain(){
  grain=document.createElement('canvas');grain.width=256;grain.height=256;
  const g=grain.getContext('2d');const im=g.createImageData(256,256);
  const r=mulberry32(1234);
  const [base,range,o1,o2]=THEME.grain;
  for(let i=0;i<im.data.length;i+=4){
    const v=base+Math.floor(r()*range);
    im.data[i]=v;im.data[i+1]=v+o1;im.data[i+2]=v+o2;im.data[i+3]=255;
  }
  g.putImageData(im,0,0);
}

/* ---------------- Main draw ---------------- */
let placedLabels=[];   // screen-space rects for collision
let hoverNote=null;

function tryLabel(c,text,sx,sy,px,opts={}){
  const cap=8+Math.round(70*S.labels);
  if(placedLabels.length>=cap)return false;
  c.font=`${opts.italic?'italic ':''}${px}px '${opts.sc?'IM Fell English SC':'IM Fell English'}'`;
  const w=c.measureText(text).width, h=px*1.15;
  const x0=opts.align==='center'?sx-w/2:sx, y0=sy-h*0.8;
  const pad=3;
  for(const r of placedLabels){
    if(x0<r.x1+pad&&x0+w>r.x0-pad&&y0<r.y1+pad&&y0+h>r.y0-pad)return false;
  }
  placedLabels.push({x0,y0,x1:x0+w,y1:y0+h});
  c.textAlign=opts.align||'left';
  if(opts.spacing){c.save();c.letterSpacing=opts.spacing+'px';}
  c.strokeStyle=`rgba(${THEME.haloRGB},0.85)`;c.lineWidth=Math.max(2.5,px*0.18);c.lineJoin='round';
  c.strokeText(text,sx,sy);
  c.fillStyle=opts.color||INK;
  c.fillText(text,sx,sy);
  if(opts.spacing)c.restore();
  c.textAlign='left';
  return true;
}

function draw(){
  if(!world)return;
  const c=ctx;
  c.setTransform(dpr,0,0,dpr,0,0);
  const sw=innerWidth,sh=innerHeight;
  const z=view.scale/Math.min(sw/W,sh/H); // normalized zoom: 1 = fit
  placedLabels=[];

  // sea
  c.fillStyle=SEA; c.fillRect(0,0,sw,sh);

  // world transform
  c.save();
  c.scale(view.scale,view.scale);
  c.translate(-view.x,-view.y);
  const lw=v=>v/view.scale;

  // coast hatching (under land)
  c.strokeStyle=`rgba(${THEME.hatchRGB},0.5)`;
  for(let i=1;i<=4;i++){
    c.lineWidth=i*10; // world units — hatch bands scale with the map
    c.globalAlpha=0.17-i*0.03;
    c.stroke(world.coastPath);
  }
  c.globalAlpha=1;

  // land
  c.fillStyle=LAND;
  c.fill(world.coastPath,'evenodd');
  // land blotches
  for(const b of world.blotches){
    const g=c.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    g.addColorStop(0,`rgba(${THEME.blotchRGB},${b.a})`);g.addColorStop(1,`rgba(${THEME.blotchRGB},0)`);
    c.fillStyle=g;c.beginPath();c.arc(b.x,b.y,b.r,0,Math.PI*2);c.fill();
  }
  // coastline
  c.strokeStyle=INK; c.lineWidth=lw(1.4); c.stroke(world.coastPath);

  // rivers
  if(S.rivers){
    c.strokeStyle=`rgba(${THEME.riverRGB},0.75)`; c.lineWidth=lw(1.2);
    for(const rv of world.rivers){
      c.beginPath(); c.moveTo(rv[0][0],rv[0][1]);
      for(let i=1;i<rv.length;i++)c.lineTo(rv[i][0],rv[i][1]);
      c.stroke();
    }
  }

  // kingdom borders
  if(S.borders&&z<5){
    c.fillStyle=`rgba(${THEME.inkRGB},0.45)`;
    for(const d of world.borderDots){c.beginPath();c.arc(d[0],d[1],lw(1.6),0,Math.PI*2);c.fill();}
  }

  // grass tufts — appear at regional zoom to fill plains
  const tuftA=smooth01(1.25,2.0,z)*0.45*S.terrain;
  if(tuftA>0.02){
    c.strokeStyle=`rgba(${THEME.tuftRGB},${tuftA})`;c.lineWidth=lw(1);
    const tn=Math.floor(world.tufts.length*S.terrain);
    for(let i=0;i<tn;i++){
      const [x,y,s]=world.tufts[i];
      c.beginPath();
      c.moveTo(x-5*s,y);c.quadraticCurveTo(x-2*s,y-6*s,x,y);
      c.moveTo(x,y);c.quadraticCurveTo(x+3*s,y-5*s,x+5*s,y-1*s);
      c.stroke();
    }
  }

  // terrain icons — count scales with terrain slider, size shrinks as you zoom in
  const tFrac=S.terrain;
  const iconScale=Math.max(0.55,1.1/Math.sqrt(z));
  c.strokeStyle=INK; c.fillStyle=INK; c.lineWidth=lw(1.1); c.lineJoin='round';
  const drawSet=(arr,fn)=>{const n=Math.floor(arr.length*tFrac);for(let i=0;i<n;i++){const m=arr[i];fn(c,m.x,m.y,m.s*iconScale);}};
  drawSet(world.mountains,drawMountain);
  drawSet(world.forests,drawTree);
  drawSet(world.hills,drawHill);
  drawSet(world.swamps,drawSwamp);

  // roads (note links) — regional zoom and closer
  const roadAlpha=smooth01(1.6,2.6,z)*0.5*S.deco;
  if(S.roads&&roadAlpha>0.01){
    c.strokeStyle=`rgba(${THEME.roadRGB},${roadAlpha})`;
    c.lineWidth=lw(1); c.setLineDash([lw(5),lw(6)]);
    const byId={}; world.data.allNotes.forEach(n=>byId[n.id]=n);
    for(const n of world.data.allNotes){
      if(n.prominence<0.45)continue;
      for(const l of n.links){
        const m=byId[l]; if(!m||m.prominence<0.45||m.id<n.id)continue;
        const mx=(n.x+m.x)/2+(n.y-m.y)*0.12, my=(n.y+m.y)/2+(m.x-n.x)*0.12;
        c.beginPath();c.moveTo(n.x,n.y);c.quadraticCurveTo(mx,my,m.x,m.y);c.stroke();
      }
    }
    c.setLineDash([]);
  }

  // settlements — reveal by prominence as you zoom
  c.strokeStyle=INK;c.fillStyle=INK;
  for(const n of world.data.allNotes){
    const reveal=1.0+(1-n.prominence)*3.2;       // zoom at which this note appears
    const a=smooth01(reveal*0.8,reveal,z);
    if(a<=0.02)continue;
    c.globalAlpha=a;
    c.lineWidth=lw(1.2);
    const s=Math.max(0.85,1.5/Math.sqrt(z))* (0.8+n.prominence*0.5);
    if(n.prominence>0.72)drawCity(c,n.x,n.y,s);
    else if(n.prominence>0.45)drawTown(c,n.x,n.y,s);
    else drawHamlet(c,n.x,n.y,s);
  }
  c.globalAlpha=1;

  // sea decorations — grand zoom only
  if(S.sea&&z<1.8){
    const sa=smooth01(1.8,1.1,z)*0.8;
    c.globalAlpha=sa; c.strokeStyle=INK; c.lineWidth=lw(1.3);
    c.lineWidth=2.2; // world units — sea creatures are map furniture, they scale with the map
    for(const sp of world.seaSpots){
      if(sp.kind==='serpent')drawSerpent(c,sp.x,sp.y,2.6);
      else if(sp.kind==='ship')drawShip(c,sp.x,sp.y,2.8);
    }
    // wave marks
    c.globalAlpha=sa*0.5*S.deco; c.lineWidth=1.6;
    const wn=Math.floor(world.waveMarks.length*S.deco);
    for(let i=0;i<wn;i++){
      const [x,y]=world.waveMarks[i];
      c.beginPath();c.moveTo(x-13,y);c.quadraticCurveTo(x-5,y-7,x,y);c.quadraticCurveTo(x+7,y+7,x+14,y);c.stroke();
    }
    c.globalAlpha=1;
  }
  c.restore();

  /* ---- labels (screen space, collision-managed, priority order) ---- */
  // 1. kingdoms (fade out when deep)
  const kAlpha=1-smooth01(2.6,4.2,z);
  if(kAlpha>0.05){
    for(const k of world.data.kingdoms){
      const px=Math.min(46,Math.max(20,15*Math.sqrt(z)*1.4));
      ctx.globalAlpha=kAlpha;
      tryLabel(ctx,k.name.toUpperCase(),w2sX(k.cx),w2sY(k.cy),px,{sc:true,align:'center',spacing:6,color:`rgba(${THEME.inkRGB},0.85)`});
      ctx.globalAlpha=1;
    }
  }
  // 2. provinces
  const pAlpha=smooth01(1.15,1.7,z)*(1-smooth01(5,7,z));
  if(pAlpha>0.05){
    for(const k of world.data.kingdoms)for(const p of k.provinces){
      ctx.globalAlpha=pAlpha;
      tryLabel(ctx,p.name,w2sX(p.cx),w2sY(p.cy)-10,15,{sc:true,align:'center',spacing:2,color:`rgba(${THEME.inkRGB},0.78)`});
      ctx.globalAlpha=1;
    }
  }
  // 3. notes, most prominent first
  const sorted=[...world.data.allNotes].sort((a,b)=>b.prominence-a.prominence);
  for(const n of sorted){
    const reveal=1.3+(1-n.prominence)*3.6;
    const a=smooth01(reveal*0.85,reveal,z);
    if(a<0.1)continue;
    ctx.globalAlpha=a;
    const px=n.prominence>0.72?14:n.prominence>0.45?12.5:11.5;
    tryLabel(ctx,n.title,w2sX(n.x)+9,w2sY(n.y)+4,px,{italic:n.prominence<=0.45});
    ctx.globalAlpha=1;
  }
  // sea name at grand zoom
  if(z<1.6){
    ctx.globalAlpha=(1-smooth01(1.1,1.6,z))*0.7;
    const seaName=(world.data.seaName||THEME.seaName).split('').join(' ');
    tryLabel(ctx,seaName,w2sX(W*0.5),w2sY(H*0.07),20,{italic:true,align:'center',color:`rgba(${THEME.inkRGB},0.6)`});
    ctx.globalAlpha=1;
  }

  /* ---- screen-space furniture ---- */
  if(S.frame){
    ctx.strokeStyle=INK;ctx.lineWidth=2;ctx.strokeRect(10,10,sw-20,sh-20);
    ctx.lineWidth=0.8;ctx.strokeRect(16,16,sw-32,sh-32);
  }
  if(S.deco>0.2) drawCompassRose(ctx,sw-80,sh-86,34);
  // cartouche
  ctx.save();
  ctx.translate(26,26);
  ctx.fillStyle=`rgba(${THEME.haloRGB},0.92)`;ctx.strokeStyle=INK;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.rect(0,0,250,64);ctx.fill();ctx.stroke();
  ctx.lineWidth=0.7;ctx.strokeRect(4,4,242,56);
  ctx.fillStyle=INK;ctx.textAlign='center';
  ctx.font="21px 'IM Fell English SC'";ctx.fillText(world.data.title||'Magna Carto',125,27);
  ctx.font="italic 12.5px 'IM Fell English'";ctx.fillText((world.data.subtitle||'The Realms of Knowledge')+' · seed '+world.seedStr,125,47);
  ctx.textAlign='left';
  ctx.restore();
  // legend
  if(S.legend){
    const lx=26,lh=118,ly=sh-lh-52;
    ctx.fillStyle=`rgba(${THEME.haloRGB},0.92)`;ctx.strokeStyle=INK;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.rect(lx,ly,178,lh);ctx.fill();ctx.stroke();
    ctx.fillStyle=INK;ctx.strokeStyle=INK;
    ctx.font="13px 'IM Fell English SC'";ctx.fillText('Legend',lx+12,ly+19);
    ctx.font="12px 'IM Fell English'";
    ctx.lineWidth=1;
    drawCity(ctx,lx+22,ly+40,0.85); ctx.fillText('prominent note',lx+44,ly+38);
    drawTown(ctx,lx+22,ly+58,0.9);  ctx.fillText('linked note',lx+44,ly+56);
    drawHamlet(ctx,lx+22,ly+72,1);  ctx.fillText('quiet note',lx+44,ly+76);
    drawMountain(ctx,lx+22,ly+96,0.8); ctx.fillText('dense cluster',lx+44,ly+92);
    ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(lx+10,ly+106);ctx.lineTo(lx+36,ly+106);ctx.stroke();ctx.setLineDash([]);
    ctx.fillText('links / roads',lx+44,ly+109);
  }

  // parchment grain + vignette
  ctx.globalAlpha=0.13;ctx.globalCompositeOperation=THEME.grainBlend||'multiply';
  const pat=ctx.createPattern(grain,'repeat');ctx.fillStyle=pat;ctx.fillRect(0,0,sw,sh);
  ctx.globalCompositeOperation='source-over';
  const vg=ctx.createRadialGradient(sw/2,sh/2,Math.min(sw,sh)*0.45,sw/2,sh/2,Math.max(sw,sh)*0.75);
  vg.addColorStop(0,`rgba(${THEME.vignetteRGB},0)`);vg.addColorStop(1,`rgba(${THEME.vignetteRGB},0.28)`);
  ctx.globalAlpha=1;ctx.fillStyle=vg;ctx.fillRect(0,0,sw,sh);

  // zoom label
  const zl=document.getElementById('zoomlabel');
  zl.textContent= z<1.4?'Grand Map':z<3.2?'Regional':'Note View';
}

/* ---------------- Interaction ---------------- */
let dragging=false,lastX=0,lastY=0;
const pointers=new Map();
let pinchD=0;

canvas.addEventListener('pointerdown',e=>{
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===1){dragging=true;lastX=e.clientX;lastY=e.clientY;canvas.classList.add('dragging');}
  if(pointers.size===2){
    const p=[...pointers.values()];pinchD=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
  }
});
canvas.addEventListener('pointermove',e=>{
  if(pointers.has(e.pointerId))pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){
    const p=[...pointers.values()];
    const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchD>0){
      const cx=(p[0].x+p[1].x)/2, cy=(p[0].y+p[1].y)/2;
      zoomAt(cx,cy,d/pinchD);
    }
    pinchD=d; return;
  }
  if(dragging){
    view.x-=(e.clientX-lastX)/view.scale;
    view.y-=(e.clientY-lastY)/view.scale;
    lastX=e.clientX;lastY=e.clientY;
    requestAnimationFrame(draw);
  } else {
    updateHover(e.clientX,e.clientY);
  }
});
const endPointer=e=>{pointers.delete(e.pointerId);if(pointers.size<2)pinchD=0;if(pointers.size===0){dragging=false;canvas.classList.remove('dragging');}};
canvas.addEventListener('pointerup',endPointer);
canvas.addEventListener('pointercancel',endPointer);

function zoomAt(sx,sy,factor){
  const minS=Math.min(innerWidth/W,innerHeight/H)*0.5;
  const maxS=minS*24;
  const ns=Math.max(minS,Math.min(maxS,view.scale*factor));
  const wx=s2wX(sx),wy=s2wY(sy);
  view.scale=ns;
  view.x=wx-sx/ns; view.y=wy-sy/ns;
  requestAnimationFrame(draw);
}
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  zoomAt(e.clientX,e.clientY,Math.exp(-e.deltaY*0.0016));
},{passive:false});

document.getElementById('zin').addEventListener('click',()=>zoomAt(innerWidth/2,innerHeight/2,1.45));
document.getElementById('zout').addEventListener('click',()=>zoomAt(innerWidth/2,innerHeight/2,1/1.45));
document.getElementById('zfit').addEventListener('click',fit);

/* hover tooltip */
const tip=document.getElementById('tooltip');
function updateHover(sx,sy){
  const z=view.scale/Math.min(innerWidth/W,innerHeight/H);
  let best=null,bd=14;
  if(z>1.2){
    for(const n of world.data.allNotes){
      const reveal=1.0+(1-n.prominence)*3.2;
      if(z<reveal*0.8)continue;
      const d=Math.hypot(w2sX(n.x)-sx,w2sY(n.y)-sy);
      if(d<bd){bd=d;best=n;}
    }
  }
  if(best!==hoverNote){
    hoverNote=best;
    if(best){
      tip.innerHTML=`<div class="t">${best.title}</div>
        <div>${best.kingdom.name} · ${best.province.name}</div>
        <div class="m">${best.degree} link${best.degree===1?'':'s'} · touched ${best.days===0?'today':best.days+' days ago'}</div>`;
      tip.style.display='block';
      canvas.style.cursor='pointer';
    } else { tip.style.display='none'; canvas.style.cursor=dragging?'grabbing':'grab'; }
  }
  if(best){
    tip.style.left=Math.min(innerWidth-260,sx+16)+'px';
    tip.style.top=Math.max(8,sy-10)+'px';
  }
}

/* ---------------- Boot ---------------- */
window.addEventListener('resize',resize);
applyTheme('sepia');
world=generateWorld('eterna');
document.getElementById('seedIn').value='eterna';
resize();fit();
// redraw once fonts arrive
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(draw);
</script>
